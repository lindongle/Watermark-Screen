name: Build Watermark-Screen

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
      
      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2
      
      - name: Restore NuGet packages
        run: nuget restore "Timer_Implementado.sln"
      
      - name: Build Release
        run: msbuild "Timer_Implementado.sln" /p:Configuration=Release /p:Platform="Any CPU"
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Watermark-Screen-Release
          path: |
            **/bin/Release/*.exe
            **/bin/Release/*.config
            **/bin/Release/*.dll
